# Copy to config.yaml and fill in real values: cp config.example.yaml config.yaml
# config.yaml is gitignored (it holds your bankroll).

bankroll: 2000.0

kelly_fraction: 0.25
max_stake_pct: 0.05
min_net_edge: 0.03
min_matches: 20

# Liquidity gate — placeholder defaults. Tune from observed order-book depth once
# scripts/probe.py has run a few times (see MASTER-PROMPT.md "Phase 3 — edge / liquidity").
min_liquidity: 100.0
max_spread: 0.05

min_price: 0.10     # favorite floor: don't back a side priced below this (deep-longshot Elo tails are unreliable + contracts balloon)
max_price: 0.95

fee_coefficient: 0.07
adverse_gap: 0.15   # flag alerts whose net edge exceeds this for manual "recent news?" scrutiny

# Thin-player handling (Elo is overconfident on players with few prior matches).
thin_matches: 50        # below this many prior matches = "thin": ABSTAIN from alerting (thin bets were worst vs the sharp close) + segment CLV/calibration. Set == min_matches to disable.
thin_kelly_haircut: 0.5  # (superseded — thin players now abstain; kept for a possible future re-enable)

# Flat unit stake during the paper phase (CLV is stake-independent). Set a $ amount to suggest a
# fixed stake instead of ¼-Kelly on the (unvalidated) p_model; remove/None to size by Kelly.
paper_flat_stake: 20.0

# Go-live gate (net-of-fee closing-line value; see /stats). Do NOT bet real money until it's MET.
# The gate now clusters by ISO WEEK (day was too fine), uses a BCa bootstrap interval, and ALSO
# requires realized net-ROI >= 0 and a low missed-capture rate — so a rosy CLV on a thin/biased
# subsample can't green-light real money.
min_effect_size: 0.015  # net-CLV 95% CI lower bound must exceed this (~1.5c, sized to cover slippage + round-up fee + ask-vs-mid basis)
min_clv_clusters: 12    # require >= this many independent ISO-WEEK clusters (alongside >= 200 bets)
max_missed_capture_rate: 0.30  # refuse go-live if more than this fraction of closing-line captures were missed

# Scheduled systematic scan (Phase 6): sweep every N hours so the CLV sample isn't biased by owner
# timing. Quiet unless a NEW alert is logged (scan_announce: true DMs every scan). Omit / None = off.
scan_interval_hours: 8.0
scan_announce: false

# Daily liveness heartbeat DM (so a silent outage doesn't masquerade as "no edge"). None disables.
heartbeat_hours: 24.0
# Warn when total OPEN (unsettled) suggested stake exceeds this fraction of bankroll (there is no
# per-alert cap for correlated same-day alerts). Bot never places orders; this is a heads-up only.
max_open_exposure_pct: 0.20

# v1 Elo model hyperparameters. The per-format logistic scales are fitted per tour by
# scripts/build_ratings.py and stored in data/model.json (not set here).
elo:
  initial_rating: 1500.0
  k_num: 250.0
  k_shift: 5.0
  k_pow: 0.4
  surface_weight: 0.3   # tuned on held-out log-loss (per-surface elo is noisier; weight it less)
  shrinkage_n0: 10.0    # cold-start shrinkage toward the mean; fit on held-out (tempers thin-player overconfidence without under-valuing breakouts)
  max_staleness_days: 365

tours: [ATP, WTA]
series:
  atp: KXATPMATCH
  wta: KXWTAMATCH   # confirmed via scripts/probe.py (2026-07-02)
  # Tournament-winner (outright) series. Kalshi lists a Grand Slam FINAL only here (not as an
  # H2H market); once the field is down to two, the outright collapses to a head-to-head, so
  # /check and /scan price it. Non-final futures markets (many players still active) are skipped.
  atp_outright: KXATP
  wta_outright: KXWTA

kalshi_base_url: https://external-api.demo.kalshi.co/trade-api/v2
